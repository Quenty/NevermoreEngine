name: studio-linux-e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'tools/studio-bridge/src/linux/**'
      - 'tools/studio-bridge/src/process/**'
      - 'tools/studio-bridge/src/commands/linux/**'
      - 'tools/nevermore-cli-helpers/src/auth/**'
      - '.github/workflows/studio-linux-e2e.yml'

jobs:
  studio-linux-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Setup registries
        run: |
          echo -e "\n//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN" >> .npmrc
          echo -e "\n//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN" >> ~/.npmrc
          echo -e "\n//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> .npmrc
          echo -e "\n//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          version: 'v0.3.0'
          token: ${{ secrets.GITHUB_TOKEN }}
          cache: true

      - name: Build all tools
        run: pnpm -r --filter './tools/**' run build

      - name: Setup Linux environment
        run: node tools/studio-bridge/dist/src/cli/cli.js linux setup --install-deps

      - name: Verify environment health (pre-auth)
        run: node tools/studio-bridge/dist/src/cli/cli.js linux status

      - name: Inject authentication
        if: ${{ env.ROBLOSECURITY != '' }}
        run: node tools/studio-bridge/dist/src/cli/cli.js linux auth
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}

      - name: Execute script through Studio bridge
        if: ${{ env.ROBLOSECURITY != '' }}
        run: node tools/studio-bridge/dist/src/cli/cli.js process run --verbose --timeout 480000 'print("E2E test passed!")'
        timeout-minutes: 10
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}

      - name: Collect Studio logs
        if: always()
        run: |
          mkdir -p /tmp/studio-logs
          cp /tmp/studio-bridge-wine.log /tmp/studio-logs/wine.log 2>/dev/null || true
          # Roblox Studio internal logs (inside Wine prefix)
          find ~/.wine/drive_c/users/ -path "*/Roblox/logs/*" -name "*.log" -exec cp {} /tmp/studio-logs/ \; 2>/dev/null || true
          # Also check for crash dumps or error logs
          find ~/.wine/drive_c/users/ -path "*/Roblox/*.log" -exec cp {} /tmp/studio-logs/ \; 2>/dev/null || true
          # List what we found
          echo "=== Collected log files ==="
          ls -la /tmp/studio-logs/ 2>/dev/null || echo "No logs found"
          echo ""
          echo "=== Wine log (last 100 lines) ==="
          tail -100 /tmp/studio-logs/wine.log 2>/dev/null || echo "No Wine log"
          echo ""
          echo "=== Studio logs ==="
          for f in /tmp/studio-logs/*.log; do
            [ "$f" = "/tmp/studio-logs/wine.log" ] && continue
            echo "--- $f ---"
            tail -50 "$f" 2>/dev/null
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-bridge-logs
          path: /tmp/studio-logs/
          if-no-files-found: ignore
