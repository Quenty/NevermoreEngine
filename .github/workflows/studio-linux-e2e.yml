name: studio-linux-e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'tools/studio-bridge/src/linux/**'
      - 'tools/studio-bridge/src/process/**'
      - 'tools/studio-bridge/src/commands/linux/**'
      - 'tools/nevermore-cli-helpers/src/auth/**'
      - 'tools/studio-bridge/docker/**'
      - '.github/workflows/studio-linux-e2e.yml'

jobs:
  studio-linux-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/quenty/nevermore-studio-linux:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user studio
      env:
        ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup registries
        run: |
          echo -e "\n//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN" >> .npmrc
          echo -e "\n//npm.pkg.github.com/:_authToken=$GITHUB_TOKEN" >> ~/.npmrc
          echo -e "\n//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> .npmrc
          echo -e "\n//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Aftman
        uses: ok-nick/setup-aftman@v0.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all tools
        run: pnpm -r --filter './tools/**' run build

      - name: Install studio-bridge CLI
        run: npm install --ignore-scripts --force -g .
        working-directory: tools/studio-bridge

      - name: Verify environment health (pre-auth)
        run: studio-bridge linux status

      - name: Inject authentication
        if: ${{ env.ROBLOSECURITY != '' }}
        run: studio-bridge linux auth
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}

      - name: Execute script through Studio bridge
        if: ${{ env.ROBLOSECURITY != '' }}
        run: studio-bridge process run --verbose --timeout 1200000 'print("E2E test passed!")'
        timeout-minutes: 25
        env:
          ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}

      - name: Print logs
        if: always()
        run: |
          echo "=== Wine log (last 100 lines) ==="
          tail -100 /tmp/studio-bridge-wine.log 2>/dev/null || echo "No Wine log"
          echo ""
          echo "=== Studio logs ==="
          tail -50 ~/.wine/drive_c/users/*/AppData/Local/Roblox/logs/*.log 2>/dev/null || echo "No Studio logs"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-bridge-logs
          path: |
            /tmp/studio-bridge-wine.log
            ~/.wine/drive_c/users/*/AppData/Local/Roblox/logs/
          if-no-files-found: ignore
